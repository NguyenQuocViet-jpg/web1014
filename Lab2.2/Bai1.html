<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài thơ Sao</title>
    <link rel="stylesheet" href="Bai1.css">
    <style>
        #kho2{
            color: blue;
        }
    </style>
</head>
<body>
    <h2>Sao</h2>
    <em id="kho1">
        Một Ngôi <strong> sao </strong> vừa rơi <br> 
        Vụt tắt trên bầu trời <br>
        Hay là trên người ấy <br>
        Vụt tắt ở trong tôi ? <br>
    </em>
    <br>

    <em id="kho2">
        Vẫy thấy trên bầu trời <br>
        Có muôn vàn <strong> sao </strong> sáng <br>
        Mà ở trong lòng tôi <br>
        Như một hành lang vắng <br>
    </em>

    <br> 

    <em id="kho3" style="color: green">
        Một ngôi <strong> sao </strong> vừa tắt <br>
        bầu trời vẫn không buồn <br>
        <strong> sao </strong> tên người ấy ấy tắt <br>
        Trong lòng tôi cô đơn <br>
    </em>
</body>
</html>
